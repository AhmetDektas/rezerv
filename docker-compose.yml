version: '3.9'

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rezerv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rezerv
      POSTGRES_USER: ${POSTGRES_USER:-rezerv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Postgres sifresi gerekli}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - '5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-rezerv} -d rezerv']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Hono.js API ────────────────────────────────────────────────────────────
  # Sistem nginx varsa: port sadece localhost'a bağlı, nginx proxy eder
  # Sistem nginx yoksa: doğrudan 4000 portu dışarı açık
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: rezerv-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-rezerv}:${POSTGRES_PASSWORD}@postgres:5432/rezerv
      JWT_SECRET: ${JWT_SECRET:?JWT secret gerekli}
      WEB_URL: ${WEB_URL:?Web URL gerekli}
      IYZICO_API_KEY: ${IYZICO_API_KEY:-}
      IYZICO_SECRET_KEY: ${IYZICO_SECRET_KEY:-}
      IYZICO_BASE_URL: ${IYZICO_BASE_URL:-https://sandbox-api.iyzipay.com}
    ports:
      # Sistem nginx zaten çalışıyorsa sadece localhost'a bağla
      - '127.0.0.1:4000:4000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
