version: '3.9'

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rezerv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rezerv
      POSTGRES_USER: ${POSTGRES_USER:-rezerv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Postgres sifresi gerekli}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - '5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-rezerv} -d rezerv']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Hono.js API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: rezerv-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-rezerv}:${POSTGRES_PASSWORD}@postgres:5432/rezerv
      JWT_SECRET: ${JWT_SECRET:?JWT secret gerekli}
      WEB_URL: http://89.167.19.1:3001
      ADMIN_SECRET: ${ADMIN_SECRET:-}
      IYZICO_API_KEY: ${IYZICO_API_KEY:-}
      IYZICO_SECRET_KEY: ${IYZICO_SECRET_KEY:-}
      IYZICO_BASE_URL: ${IYZICO_BASE_URL:-https://sandbox-api.iyzipay.com}
    ports:
      - '0.0.0.0:4000:4000'
    healthcheck:
      test: ['CMD-SHELL', 'node -e "require(\"http\").get(\"http://localhost:4000/health\", r => process.exit(r.statusCode === 200 ? 0 : 1)).on(\"error\", () => process.exit(1))"']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── Next.js Web ─────────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://89.167.19.1:4000
        NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_KEY:-}
    container_name: rezerv-web
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - '0.0.0.0:3001:3000'
    healthcheck:
      test: ['CMD-SHELL', 'node -e "require(\"http\").get(\"http://localhost:3000\", r => process.exit(r.statusCode < 500 ? 0 : 1)).on(\"error\", () => process.exit(1))"']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
    driver: local
